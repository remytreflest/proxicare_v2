version: '3.8'

services:
  # ========================
  # API Node.js
  # ========================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proxicare-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DEBUG: ${DEBUG:-false}
      PORT: 3000
      # Base de données
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-proxicare}
      DB_USER: ${DB_USER:-proxicare}
      DB_PASSWORD: ${DB_PASSWORD:-proxicare_password}
      # Auth0
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      # CORS
      API_CORS: ${API_CORS:-http://localhost:4200}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - proxicare-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ========================
  # PostgreSQL
  # ========================
  postgres:
    image: postgres:16-alpine
    container_name: proxicare-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-proxicare}
      POSTGRES_USER: ${DB_USER:-proxicare}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-proxicare_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - proxicare-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-proxicare} -d ${DB_NAME:-proxicare}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ========================
  # pgAdmin (optionnel - dev)
  # ========================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: proxicare-pgadmin
    restart: unless-stopped
    profiles:
      - dev
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@proxicare.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - proxicare-network

# ========================
# Volumes
# ========================
volumes:
  postgres-data:
    name: proxicare-postgres-data
  pgadmin-data:
    name: proxicare-pgadmin-data

# ========================
# Networks
# ========================
networks:
  proxicare-network:
    name: proxicare-network
    driver: bridge
