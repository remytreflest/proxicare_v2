paths:
  /api/user:
    get:
      tags:
        - Utilisateurs
      summary: Récupérer l'utilisateur courant
      description: Retourne les informations de l'utilisateur connecté avec ses relations (patient, professionnel de santé)
      security:
        - bearerAuth: []
          userIdHeader: []
      responses:
        '200':
          description: Utilisateur trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: Utilisateur non trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Erreur serveur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/register/user:
    post:
      tags:
        - Utilisateurs
      summary: Créer un nouvel utilisateur
      description: Enregistre un nouvel utilisateur dans le système
      security:
        - bearerAuth: []
          userIdHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - firstName
                - lastName
                - email
              properties:
                firstName:
                  type: string
                  example: Jean
                lastName:
                  type: string
                  example: Dupont
                email:
                  type: string
                  format: email
                  example: jean.dupont@email.com
      responses:
        '201':
          description: Utilisateur créé avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Champs requis manquants
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Utilisateur déjà existant (ID ou email)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/register/patient:
    post:
      tags:
        - Utilisateurs
      summary: Enregistrer un patient
      description: Enregistre l'utilisateur courant en tant que patient
      security:
        - bearerAuth: []
          userIdHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - birthday
                - gender
                - address
                - socialSecurityNumber
                - structureId
              properties:
                birthday:
                  type: string
                  format: date
                  example: '1990-01-15'
                gender:
                  type: string
                  enum: [M, F]
                  example: M
                address:
                  type: string
                  example: 123 Rue de la Santé, 75014 Paris
                socialSecurityNumber:
                  type: string
                  minLength: 15
                  maxLength: 15
                  example: '190017512345678'
                structureId:
                  type: integer
                  example: 1
      responses:
        '201':
          description: Patient enregistré avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Patient enregistré avec succès.
                  patient:
                    $ref: '#/components/schemas/Patient'
        '400':
          description: Champs requis manquants
        '404':
          description: Utilisateur non trouvé
        '409':
          description: Patient déjà existant ou numéro de sécurité sociale déjà utilisé

  /api/register/healthcareprofessional:
    post:
      tags:
        - Utilisateurs
      summary: Enregistrer un professionnel de santé
      description: Enregistre l'utilisateur courant en tant que professionnel de santé
      security:
        - bearerAuth: []
          userIdHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - speciality
                - structureId
                - idn
              properties:
                speciality:
                  type: string
                  enum: [NURSE]
                  example: NURSE
                structureId:
                  type: integer
                  example: 1
                idn:
                  type: string
                  description: Numéro ADELI ou RPPS
                  example: '123456789'
      responses:
        '201':
          description: Professionnel enregistré avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Professionnel de soins enregistré avec succès.
        '400':
          description: Champs requis manquants ou spécialité invalide
        '404':
          description: Utilisateur non trouvé
        '409':
          description: Professionnel déjà existant
