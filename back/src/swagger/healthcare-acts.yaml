paths:
  /api/healthcare/acts:
    get:
      tags:
        - Actes de soins
      summary: Liste tous les actes de soins
      description: Retourne la liste de tous les actes de soins disponibles
      security:
        - bearerAuth: []
          userIdHeader: []
      responses:
        '200':
          description: Liste des actes de soins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HealthcareAct'
        '500':
          description: Erreur serveur

  /api/healthcare/acts/user:
    get:
      tags:
        - Actes de soins
      summary: Actes du professionnel connecté
      description: Retourne les actes de soins associés au professionnel de santé connecté
      security:
        - bearerAuth: []
          userIdHeader: []
      responses:
        '200':
          description: Liste des actes du professionnel
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HealthcareAct'
        '404':
          description: Professionnel non trouvé
        '500':
          description: Erreur serveur

  /api/healthcare/act:
    post:
      tags:
        - Actes de soins
      summary: Créer un acte de soin
      description: Crée un nouvel acte de soin dans le système
      security:
        - bearerAuth: []
          userIdHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - price
              properties:
                name:
                  type: string
                  example: Injection intraveineuse
                description:
                  type: string
                  example: Administration de médicament par voie intraveineuse
                price:
                  type: number
                  format: float
                  example: 6.30
      responses:
        '201':
          description: Acte créé avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Acte de soin créé avec succès.
                  act:
                    $ref: '#/components/schemas/HealthcareAct'
        '400':
          description: Champs requis manquants
        '409':
          description: Acte avec ce nom déjà existant

  /api/healthcare/act/healthcareprofessional:
    post:
      tags:
        - Actes de soins
      summary: Associer un acte au professionnel
      description: Associe un acte de soin au professionnel de santé connecté
      security:
        - bearerAuth: []
          userIdHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - healthcareActId
              properties:
                healthcareActId:
                  type: integer
                  example: 1
      responses:
        '201':
          description: Association créée avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Association créée avec succès.
        '400':
          description: Paramètres manquants
        '404':
          description: Professionnel ou acte non trouvé

  /api/healthcare/act/healthcareprofessional/{actId}:
    delete:
      tags:
        - Actes de soins
      summary: Dissocier un acte du professionnel
      description: Supprime l'association entre un acte de soin et le professionnel connecté
      security:
        - bearerAuth: []
          userIdHeader: []
      parameters:
        - name: actId
          in: path
          required: true
          description: ID de l'acte à dissocier
          schema:
            type: integer
      responses:
        '200':
          description: Association supprimée avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Acte supprimé avec succès.
        '400':
          description: ID invalide
        '404':
          description: Association non trouvée
