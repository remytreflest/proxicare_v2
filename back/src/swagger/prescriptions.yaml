paths:
  /api/prescriptions:
    post:
      tags:
        - Prescriptions
      summary: Créer une prescription
      description: |
        Crée une nouvelle prescription pour un patient identifié par son numéro de sécurité sociale.
        Une prescription peut contenir plusieurs actes de soins.
      security:
        - bearerAuth: []
          userIdHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - socialSecurityNumber
                - startDate
                - endDate
                - acts
              properties:
                socialSecurityNumber:
                  type: string
                  description: Numéro de sécurité sociale du patient (15 caractères)
                  example: '190017512345678'
                startDate:
                  type: string
                  format: date
                  description: Date de début de validité de la prescription
                  example: '2025-01-01'
                endDate:
                  type: string
                  format: date
                  description: Date de fin de validité de la prescription
                  example: '2025-06-30'
                acts:
                  type: array
                  description: Liste des actes prescrits avec leur fréquence
                  items:
                    type: object
                    required:
                      - healthcareActId
                      - quantity
                    properties:
                      healthcareActId:
                        type: integer
                        description: ID de l'acte de soin
                        example: 1
                      quantity:
                        type: integer
                        description: Nombre d'actes prescrits
                        example: 30
                  example:
                    - healthcareActId: 1
                      quantity: 30
                    - healthcareActId: 2
                      quantity: 15
      responses:
        '201':
          description: Prescription créée avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Prescription enregistrée avec succès.
        '400':
          description: Champs requis manquants ou invalides
        '404':
          description: Patient ou acte de soin non trouvé

  /api/prescriptions/patient:
    get:
      tags:
        - Prescriptions
      summary: Prescriptions du patient
      description: Retourne toutes les prescriptions du patient connecté avec les détails des actes
      security:
        - bearerAuth: []
          userIdHeader: []
      responses:
        '200':
          description: Liste des prescriptions du patient
          content:
            application/json:
              schema:
                type: array
                items:
                  allOf:
                    - $ref: '#/components/schemas/Prescription'
                    - type: object
                      properties:
                        prescriptionHealthcareActs:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: integer
                              healthcareActId:
                                type: integer
                              status:
                                type: string
                                enum: [TO_BE_PLANNED, PLANNED, PERFORMED, CANCELLED]
                              healthcareAct:
                                $ref: '#/components/schemas/HealthcareAct'
        '404':
          description: Patient non trouvé
        '500':
          description: Erreur serveur

  /api/prescriptions/healthcareprofessional:
    get:
      tags:
        - Prescriptions
      summary: Prescriptions pour le professionnel
      description: |
        Retourne les prescriptions des patients associés aux structures du professionnel connecté.
        Permet au professionnel de voir les soins à planifier.
      security:
        - bearerAuth: []
          userIdHeader: []
      responses:
        '200':
          description: Liste des prescriptions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Prescription'
        '404':
          description: Professionnel non trouvé
        '500':
          description: Erreur serveur
